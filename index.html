<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/main.css">
    <title>Cards</title>
</head>

<body>
    <header class="header">
        <div class="container flex-container">
            <h1 class="title_1"><span>C</span><span>a</span><span>r</span><span>d</span><span>s</span></h1>
        </div>
    </header>
    <main class="main">
        <section class="section">
            <div class="container flex-container">
                <div class="cards">
                    <div class="card">
                        <img src="./assets/img/card_back.png" alt="card" class="card__back">
                        <p class="card__front" value="A"><span class="card__spades">♠</span></p>
                    </div>
                    <div class="card">
                        <img src="./assets/img/card_back.png" alt="card" class="card__back">
                        <p class="card__front" value="A"><span class="card__clubs">♣</span></p>
                    </div>
                    <div class="card card_red">
                        <img src="./assets/img/card_back.png" alt="card" class="card__back">
                        <p class="card__front" value="A"><span class="card__hearts">♥</span></p>
                    </div>
                    <div class="card card_red">
                        <img src="./assets/img/card_back.png" alt="card" class="card__back">
                        <p class="card__front" value="A"><span class="card__diamonds">♦</span></p>
                    </div>
                    <div class="card">
                        <img src="./assets/img/card_back.png" alt="card" class="card__back">
                        <p class="card__front" value="A"><span class="card__spades">♠</span></p>
                    </div>
                    <div class="card">
                        <img src="./assets/img/card_back.png" alt="card" class="card__back">
                        <p class="card__front" value="A"><span class="card__spades">♠</span></p>
                    </div>
                </div>
            </div>
        </section>
    </main>
</body>

</html>
